{% extends "base.html" %}
{% block content %}

<style>
.container-box {
    background: var(--bg-card-alt, #1f2a42);
    padding: 25px;
    border-radius: 15px;
    border: 1px solid rgba(255, 255, 255, 0.06);
    box-shadow: 0 8px 20px rgba(0,0,0,0.28);
    margin-top: 20px;
    animation: fadeInUp 0.4s ease both;
}

.breadcrumb {
    font-size: 15px;
    margin-bottom: 10px;
    color: var(--text-secondary, #a6b0c3);
}

.breadcrumb a {
    color: #6fa8ff;
    text-decoration: none;
}

.back-btn {
    background: linear-gradient(135deg, #2a9df4, #1c7ed6);
    color: white;
    padding: 7px 14px;
    text-decoration: none;
    border-radius: 6px;
    font-size: 14px;
    transition: transform 0.2s ease;
}

.back-btn:hover {
    transform: translateY(-2px);
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}

th, td {
    padding: 12px;
    text-align: center;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    color: var(--text-primary, #e9edf7);
}

th {
    background: #202a42;
    color: #f1f4ff;
    font-weight: 600;
}
</style>

<div class="container-box">

    <p class="breadcrumb">
        <a href="{{ url_for('dashboard') }}">Dashboard</a> / Total Beds
    </p>

    <a href="{{ url_for('dashboard') }}" class="back-btn">⬅ Back</a>

    <h3 style="text-align:center; margin-top:16px; color: var(--text-primary, #e9edf7);">Total Beds</h3>

    <table>
        <thead>
            <tr>
                <th>Room Number</th>
                <th>Total Beds</th>
            </tr>
        </thead>

        <tbody>
            {% for room, bedlist in rooms.items() %}
            <tr>
                <td>{{ room }}</td>
                <td>{{ bedlist | join(', ') }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

{% endblock %}
