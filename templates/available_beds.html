{% extends "base.html" %}
{% block content %}

<style>
.container-box {
    background: rgba(15, 23, 42, 0.96);
    padding: 28px;
    border-radius: 20px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.24);
    margin-top: 20px;
    border: 1px solid rgba(148, 163, 184, 0.16);
}

.breadcrumb {
    font-size: 15px;
    margin-bottom: 14px;
    color: #94a3b8;
}

.back-btn {
    background: rgba(56, 189, 248, 0.15);
    color: #e2e8f0;
    padding: 10px 18px;
    text-decoration: none;
    border-radius: 12px;
    font-size: 14px;
    border: 1px solid rgba(56, 189, 248, 0.22);
}

.back-btn:hover {
    background: rgba(56, 189, 248, 0.28);
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 18px;
}

th, td {
    padding: 14px 16px;
    text-align: center;
    border-bottom: 1px solid rgba(148, 163, 184, 0.16);
    color: #cbd5e1;
}

th {
    background: rgba(15, 23, 42, 0.98);
    font-weight: 600;
}

tbody tr:nth-child(even) {
    background: rgba(255,255,255,0.04);
}

tbody tr:hover {
    background: rgba(56, 189, 248, 0.08);
}
</style>

<div class="container-box">

    <p class="breadcrumb">
        <a href="{{ url_for('dashboard') }}">Dashboard</a> / Total Beds
    </p>

    <a href="{{ url_for('dashboard') }}" class="back-btn">⬅ Back</a>

    <a href="{{ url_for('available_beds') }}">Total  Beds</a>

    <h3 style="text-align:center; margin-top:10px;">Total Beds</h3>

    <table>
        <thead>
            <tr>
                <th>Room Number</th>
                <th>Total Beds</th>
            </tr>
        </thead>

        <tbody>
            {% for room, bedlist in rooms.items() %}
            <tr>
                <td>{{ room }}</td>
                <td>{{ bedlist | join(', ') }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

{% endblock %}
