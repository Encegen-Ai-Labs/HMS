<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostel Admin</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">


    <style>
        :root {
            --bg: #071421;
            --surface: rgba(15, 23, 42, 0.95);
            --surface-strong: #0c1726;
            --surface-soft: rgba(15, 23, 42, 0.85);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --border: rgba(148, 163, 184, 0.18);
            --primary: #38bdf8;
            --accent: #22c55e;
            --danger: #f87171;
            --warning: #fbbf24;
            --radius: 18px;
            --shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
        }

        html {
            overflow-y: scroll;
            min-height: 100%;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.12), transparent 30%),
                        linear-gradient(180deg, #071421 0%, #071421 100%);
            color: var(--text);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button,
        input,
        select,
        textarea {
            font-family: inherit;
        }

        .sidebar {
            width: 250px;
            min-height: 100vh;
            background: #0b1828;
            color: #dbeafe;
            padding: 26px 22px;
            position: fixed;
            top: 0;
            left: 0;
            overflow-y: auto;
            border-right: 1px solid rgba(148, 163, 184, 0.16);
            box-shadow: inset -1px 0 0 rgba(148, 163, 184, 0.08);
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.12);
            font-weight: 600;
            letter-spacing: 0.03em;
            color: #f8fafc;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #cbd5e1;
            padding: 14px 16px;
            border-radius: 14px;
            font-size: 15px;
            margin: 8px 0;
            transition: all 0.25s ease;
            border-left: 3px solid transparent;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: rgba(34, 197, 94, 0.14);
            color: #f8fafc;
            border-left-color: var(--accent);
            transform: translateX(2px);
        }

        .top-header {
            position: fixed;
            top: 0;
            left: 250px;
            right: 0;
            height: 64px;
            background: #071421;
            display: flex;
            align-items: center;
            padding: 0 28px;
            z-index: 1000;
            border-bottom: 1px solid rgba(148, 163, 184, 0.12);
            backdrop-filter: blur(10px);
        }

        .header-spacer {
            flex: 1;
        }

        .header-actions {
            display: flex;
            gap: 18px;
        }

        .header-link {
            color: #cbd5e1;
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s ease;
        }

        .header-link:hover {
            color: var(--accent);
        }

        .main-area {
            margin-left: 250px;
            padding: 96px 30px 32px;
            min-height: 100vh;
            background: linear-gradient(180deg, rgba(7, 20, 33, 0.9), rgba(7, 20, 33, 1));
        }

        .content {
            padding: 0;
        }

        .content-box {
            background: rgba(15, 23, 42, 0.96);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(148, 163, 184, 0.12);
            box-shadow: var(--shadow);
            animation: fadeInUp 0.7s ease;
        }

        .content-box h1,
        .content-box h2,
        .content-box h3,
        .content-box h4,
        .content-box h5,
        .content-box h6,
        .content-box p,
        .content-box label,
        .content-box td,
        .content-box th {
            color: #e2e8f0;
        }

        .page-title,
        .profile-header h3,
        .summary-box h5,
        .page-wrapper,
        .total-fees-title,
        .main-title,
        .title {
            color: #f8fafc;
        }

        .btn-primary,
        .btn-secondary,
        .btn-add,
        .btn-success,
        .add-btn,
        .update-btn {
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .btn-primary:hover,
        .btn-secondary:hover,
        .btn-add:hover,
        .btn-success:hover,
        .add-btn:hover,
        .update-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 30px rgba(34, 197, 94, 0.18);
        }

        .btn-primary {
            background: linear-gradient(135deg, #22c55e, #2dd4bf);
            color: #0f172a;
        }

        .btn-secondary {
            background: #0f172a;
            color: #f8fafc;
            border: 1px solid rgba(148, 163, 184, 0.15);
        }

        .btn-tertiary,
        .btn-tertiary-danger,
        .btn-tertiary:hover,
        .btn-tertiary-danger:hover {
            border: 1px solid rgba(148, 163, 184, 0.16);
        }

        .btn-tertiary {
            color: #38bdf8;
            background: rgba(56, 189, 248, 0.12);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 10px;
            padding: 8px 16px;
        }

        .btn-tertiary-danger {
            color: #f87171;
            background: rgba(248, 113, 113, 0.12);
        }

        .styled-table,
        .custom-table,
        .fees-table,
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 15px;
            overflow: hidden;
        }

        .styled-table th,
        .custom-table th,
        .fees-table th,
        table th {
            background: rgba(15, 23, 42, 0.96);
            color: #e2e8f0;
            font-weight: 600;
            padding: 14px 16px;
            text-align: center;
        }

        .styled-table td,
        .custom-table td,
        .fees-table td,
        table td {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.12);
            color: #cbd5e1;
        }

        .styled-table tbody tr:nth-child(even),
        .custom-table tbody tr:nth-child(even),
        .fees-table tbody tr:nth-child(even),
        table tbody tr:nth-child(even) {
            background: rgba(255, 255, 255, 0.03);
        }

        .styled-table tbody tr:hover,
        .custom-table tbody tr:hover,
        .fees-table tbody tr:hover,
        table tbody tr:hover {
            background: rgba(56, 189, 248, 0.08);
        }

        input,
        select,
        textarea {
            background: #0f172a;
            color: #e2e8f0;
            border: 1px solid rgba(148, 163, 184, 0.16);
            border-radius: 12px;
            padding: 12px 14px;
            outline: none;
            transition: all 0.25s ease;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: rgba(56, 189, 248, 0.6);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.12);
        }

        label {
            color: #cbd5e1;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .form-grid,
        .form-row,
        .info-grid,
        .summary-grid {
            gap: 16px;
        }

        .profile-card,
        .outer-box,
        .inner-card,
        .fee-container,
        .container,
        .container-box,
        .change-room-container,
        .page-wrapper,
        .modal-content,
        .profile-header,
        .page-title,
        .total-fees-container {
            background: rgba(15, 23, 42, 0.96);
            border: 1px solid rgba(148, 163, 184, 0.12);
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.18);
        }

        .page-wrapper {
            margin: 15px 0 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 22px;
            gap: 10px;
            border-radius: 20px;
            font-size: 22px;
            font-weight: 600;
        }

        .profile-header {
            background: linear-gradient(135deg, #0f172a, #0f172a 55%, rgba(34, 197, 94, 0.16));
            text-align: center;
            padding: 28px;
            border-radius: 20px;
            color: #e2e8f0;
            margin-bottom: 25px;
        }

        .profile-card {
            padding: 24px;
            border-radius: 20px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 18px;
        }

        .summary-box {
            padding: 24px;
            border-radius: 18px;
            text-align: center;
            box-shadow: inset 0 0 0 1px rgba(148, 163, 184, 0.08);
        }

        .summary-box h5 {
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .summary-box p {
            font-size: 28px;
            font-weight: 700;
            color: #f8fafc;
        }

        .highlight-card {
            color: var(--accent);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
        }

        .badge-paid {
            background: rgba(34, 197, 94, 0.18);
            color: #a7f3d0;
        }

        .badge-pending {
            background: rgba(251, 191, 36, 0.18);
            color: #facc15;
        }

        .toast {
            min-width: 250px;
            padding: 16px 20px;
            margin-top: 12px;
            border-radius: 16px;
            color: #fff;
            font-size: 14px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.22);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2><i class="fas fa-hotel"></i> Hostel Admin</h2>

    <a href="/dashboard" class="{% if active_page=='dashboard' %}active{% endif %}">
        <i class="fas fa-home"></i> Dashboard
    </a>

    <a href="/students" class="{% if active_page=='students' %}active{% endif %}">
        <i class="fas fa-user-graduate"></i> Students
    </a>

    <a href="/rooms" class="{% if active_page=='rooms' %}active{% endif %}">
        <i class="fas fa-door-open"></i> Rooms
    </a>

    <a href="/beds" class="{% if active_page=='beds' %}active{% endif %}">
        <i class="fas fa-bed"></i> Beds
    </a>

    <a href="/fees" class="{% if active_page=='fees' %}active{% endif %}">
        <i class="fas fa-money-bill-wave"></i> Fees
    </a>


    <a href="/logs" class="{% if active_page=='logs' %}active{% endif %}">
        <i class="fas fa-history"></i> Log Report
    </a>

    <a href="/logout">
        <i class="fas fa-sign-out-alt"></i> Logout
    </a>
</div>

<!-- TOP HEADER -->
<div class="top-header">
    <div class="header-spacer"></div>

    <div class="header-actions">
        <a href="/dashboard" class="header-link">
            <i class="fas fa-house"></i> Home
        </a>

        <a href="{{ url_for('admin_profile') }}" class="nav-link profile-link">
            <i class="fas fa-user"></i> Profile
        </a>
    </div>
</div>

<!-- MAIN CONTENT -->
<div class="main-area">
    <div class="content">
        <div class="content-box">
            {% block content %}
            {% endblock %}
        </div>
    </div>
</div>

<!-- Toast Container -->
<!-- Toast Container -->
<div id="toast-container"
     style="position: fixed; bottom: 25px; right: 25px; z-index: 9999;">
</div>

<script>
function showToast(message, category) {
    let bg = "#28a745"; // success

    if (category === "error" || category === "danger") bg = "#dc3545";
    if (category === "warning") bg = "#ffc107";
    if (category === "info") bg = "#0dcaf0";

    let toast = document.createElement("div");
    toast.style.minWidth = "250px";
    toast.style.padding = "15px 20px";
    toast.style.marginTop = "10px";
    toast.style.borderRadius = "8px";
    toast.style.color = "white";
    toast.style.backgroundColor = bg;
    toast.style.fontSize = "15px";
    toast.style.boxShadow = "0 4px 12px rgba(0,0,0,0.15)";
    toast.style.opacity = "0";
    toast.style.transition = "opacity 0.5s ease";
    toast.innerText = message;

    document.getElementById("toast-container").appendChild(toast);

    setTimeout(() => toast.style.opacity = "1", 100);

    setTimeout(() => {
        toast.style.opacity = "0";
        setTimeout(() => toast.remove(), 500);
    }, 3000);
}
</script>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for category, message in messages %}
<div class="flask-toast" data-message="{{ message }}" data-category="{{ category }}" style="display:none;"></div>
{% endfor %}
<script>
document.addEventListener("DOMContentLoaded", function () {
    document.querySelectorAll(".flask-toast").forEach(function(el) {
        showToast(el.dataset.message, el.dataset.category);
    });
});
</script>
{% endif %}
{% endwith %}


</body>
</html>
