<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostel Admin</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">

    <style>

    /* =========================================================
       DARK THEME DESIGN SYSTEM — CSS VARIABLES
       ========================================================= */
    :root {
        --bg-app: #0e1420;
        --bg-sidebar: #131a2b;
        --bg-header: #131a2b;
        --bg-card: #1a2236;
        --bg-card-alt: #1f2a42;
        --bg-input: #1c2438;
        --border-soft: rgba(255, 255, 255, 0.08);
        --border-softer: rgba(255, 255, 255, 0.05);
        --text-primary: #e9edf7;
        --text-secondary: #a6b0c3;
        --text-muted: #6d7690;
        --accent: #1cc88a;
        --accent-dark: #17a874;
        --accent-soft: rgba(28, 200, 138, 0.14);
        --blue: #4e8cff;
        --blue-soft: rgba(78, 140, 255, 0.14);
        --danger: #ef5a6f;
        --danger-soft: rgba(239, 90, 111, 0.14);
        --warning: #f6c23e;
        --warning-soft: rgba(246, 194, 62, 0.14);
        --radius-lg: 16px;
        --radius-md: 10px;
        --radius-sm: 6px;
        --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.35);
        --shadow-card: 0 6px 18px rgba(0, 0, 0, 0.28);
        --transition: 0.25s ease;
    }

    html {
        overflow-y: scroll;
        scroll-behavior: smooth;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Inter', 'Poppins', sans-serif;
    }

    body {
        background: var(--bg-app);
        color: var(--text-primary);
    }

    ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
    }
    ::-webkit-scrollbar-track {
        background: var(--bg-app);
    }
    ::-webkit-scrollbar-thumb {
        background: #2a3450;
        border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
        background: var(--accent);
    }

    /* ================= SIDEBAR ================= */
    .sidebar {
        width: 250px;
        min-height: 100vh;
        background: linear-gradient(180deg, var(--bg-sidebar) 0%, #0f1626 100%);
        color: #fff;
        padding: 22px 16px;
        position: fixed;
        top: 0;
        left: 0;
        overflow-y: auto;
        border-right: 1px solid var(--border-soft);
        z-index: 1100;
        animation: slideInLeft 0.45s ease both;
    }

    .sidebar h2 {
        text-align: center;
        margin-bottom: 22px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--border-soft);
        font-weight: 600;
        font-size: 19px;
        letter-spacing: 0.3px;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    .sidebar h2 i {
        color: var(--accent);
    }

    .sidebar a {
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--text-secondary);
        text-decoration: none;
        padding: 12px 16px;
        border-radius: var(--radius-md);
        font-size: 15px;
        font-weight: 500;
        margin: 6px 0;
        transition: background var(--transition), color var(--transition), transform var(--transition), padding-left var(--transition);
        border: 1px solid transparent;
        position: relative;
    }

    .sidebar a i {
        width: 18px;
        text-align: center;
        color: var(--text-muted);
        transition: color var(--transition);
    }

    .sidebar a:hover {
        background: rgba(28, 200, 138, 0.10);
        color: #fff;
        padding-left: 20px;
        border-color: rgba(28, 200, 138, 0.25);
    }

    .sidebar a:hover i {
        color: var(--accent);
    }

    /* ACTIVE MENU */
    .sidebar a.active {
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%) !important;
        color: #ffffff !important;
        box-shadow: 0 6px 16px rgba(28, 200, 138, 0.28);
    }

    .sidebar a.active i {
        color: #fff !important;
    }

    .sidebar a[href="/logout"] {
        margin-top: 18px;
        border-top: 1px solid var(--border-soft);
        padding-top: 16px;
        border-radius: 0;
        color: var(--danger);
    }

    .sidebar a[href="/logout"] i {
        color: var(--danger);
    }

    .sidebar a[href="/logout"]:hover {
        background: var(--danger-soft);
        color: var(--danger);
        border-color: transparent;
    }

    /* Main Content */
    .content-box {
        background: var(--bg-card);
        padding: 28px 32px;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-card) !important;
        border: 1px solid var(--border-soft);
        color: var(--text-primary);
        animation: fadeInUp 0.4s ease both;
    }

    /* ===== TOP HEADER ===== */
    .top-header {
        position: fixed;
        top: 0;
        left: 250px;
        right: 0;
        height: 64px;
        background: var(--bg-header);
        display: flex;
        align-items: center;
        padding: 0 30px;
        z-index: 1000;
        border-bottom: 1px solid var(--border-soft);
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
    }

    .header-spacer {
        flex: 1;
    }

    .header-actions {
        display: flex;
        gap: 28px;
    }

    .header-link {
        color: var(--text-secondary);
        text-decoration: none;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 8px 14px;
        border-radius: var(--radius-sm);
        transition: background var(--transition), color var(--transition);
    }

    .header-link i {
        font-size: 15px;
    }

    .header-link:hover {
        color: #fff;
        background: rgba(28, 200, 138, 0.12);
    }

    /* ===== MAIN AREA ===== */
    .main-area {
        margin-left: 250px;
        padding-top: 84px;
        min-height: 100vh;
        background: var(--bg-app);
    }

    .content {
        padding: 30px;
    }

    .profile-link {
        color: var(--text-secondary) !important;
        text-decoration: none;
        cursor: pointer;
    }

    .profile-link:hover {
        color: #fff;
    }

    /* ================= ANIMATIONS ================= */
    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(14px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideInLeft {
        from { opacity: 0; transform: translateX(-16px); }
        to { opacity: 1; transform: translateX(0); }
    }

    @keyframes shake {
        10%, 90% { transform: translateX(-1px); }
        20%, 80% { transform: translateX(2px); }
        30%, 50%, 70% { transform: translateX(-4px); }
        40%, 60% { transform: translateX(4px); }
    }

    @keyframes toastIn {
        from { opacity: 0; transform: translateY(12px) scale(0.98); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ================= FORM VALIDATION STYLING ================= */
    input, select, textarea {
        transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
    }

    input.field-invalid,
    select.field-invalid,
    textarea.field-invalid {
        border-color: var(--danger) !important;
        box-shadow: 0 0 0 3px var(--danger-soft) !important;
        animation: shake 0.4s ease;
    }

    input.field-valid,
    select.field-valid,
    textarea.field-valid {
        border-color: var(--accent) !important;
        box-shadow: 0 0 0 3px var(--accent-soft) !important;
    }

    .field-error-msg {
        display: block;
        color: var(--danger);
        font-size: 12.5px;
        margin-top: 4px;
        margin-bottom: 6px;
        animation: fadeInUp 0.2s ease both;
    }

    </style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2><i class="fas fa-hotel"></i> Hostel Admin</h2>

    <a href="/dashboard" class="{% if active_page=='dashboard' %}active{% endif %}">
        <i class="fas fa-home"></i> Dashboard
    </a>

    <a href="/students" class="{% if active_page=='students' %}active{% endif %}">
        <i class="fas fa-user-graduate"></i> Students
    </a>

    <a href="/rooms" class="{% if active_page=='rooms' %}active{% endif %}">
        <i class="fas fa-door-open"></i> Rooms
    </a>

    <a href="/beds" class="{% if active_page=='beds' %}active{% endif %}">
        <i class="fas fa-bed"></i> Beds
    </a>

    <a href="/fees" class="{% if active_page=='fees' %}active{% endif %}">
        <i class="fas fa-money-bill-wave"></i> Fees
    </a>


    <a href="/logs" class="{% if active_page=='logs' %}active{% endif %}">
        <i class="fas fa-history"></i> Log Report
    </a>

    <a href="/logout">
        <i class="fas fa-sign-out-alt"></i> Logout
    </a>
</div>

<!-- TOP HEADER -->
<div class="top-header">
    <div class="header-spacer"></div>

    <div class="header-actions">
        <a href="/dashboard" class="header-link">
            <i class="fas fa-house"></i> Home
        </a>

        <a href="{{ url_for('admin_profile') }}" class="nav-link profile-link">
            <i class="fas fa-user"></i> Profile
        </a>
    </div>
</div>

<!-- MAIN CONTENT -->
<div class="main-area">
    <div class="content">
        <div class="content-box">
            {% block content %}
            {% endblock %}
        </div>
    </div>
</div>

<!-- Toast Container -->
<div id="toast-container"
     style="position: fixed; bottom: 25px; right: 25px; z-index: 9999;">
</div>

<script>
function showToast(message, category) {
    let bg = "#1cc88a"; // success
    let icon = "fa-circle-check";

    if (category === "error" || category === "danger") { bg = "#ef5a6f"; icon = "fa-circle-xmark"; }
    if (category === "warning") { bg = "#f6c23e"; icon = "fa-triangle-exclamation"; }
    if (category === "info") { bg = "#4e8cff"; icon = "fa-circle-info"; }

    let toast = document.createElement("div");
    toast.style.minWidth = "260px";
    toast.style.padding = "14px 20px";
    toast.style.marginTop = "10px";
    toast.style.borderRadius = "10px";
    toast.style.color = "white";
    toast.style.background = bg;
    toast.style.fontSize = "14.5px";
    toast.style.fontWeight = "500";
    toast.style.display = "flex";
    toast.style.alignItems = "center";
    toast.style.gap = "10px";
    toast.style.boxShadow = "0 10px 25px rgba(0,0,0,0.35)";
    toast.style.opacity = "0";
    toast.style.animation = "toastIn 0.35s ease both";
    toast.style.transition = "opacity 0.4s ease, transform 0.4s ease";
    toast.innerHTML = '<i class="fas ' + icon + '"></i><span>' + message + '</span>';

    document.getElementById("toast-container").appendChild(toast);

    requestAnimationFrame(() => toast.style.opacity = "1");

    setTimeout(() => {
        toast.style.opacity = "0";
        toast.style.transform = "translateY(10px)";
        setTimeout(() => toast.remove(), 400);
    }, 3200);
}
</script>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for category, message in messages %}
<div class="flask-toast" data-message="{{ message }}" data-category="{{ category }}" style="display:none;"></div>
{% endfor %}
<script>
document.addEventListener("DOMContentLoaded", function () {
    document.querySelectorAll(".flask-toast").forEach(function(el) {
        showToast(el.dataset.message, el.dataset.category);
    });
});
</script>
{% endif %}
{% endwith %}

<!-- Global real-time form validation + input animations -->
<script src="{{ url_for('static', filename='js/validation.js') }}"></script>

</body>
</html>
