<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostel Admin</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">


    <style>

        html {
    overflow-y: scroll;
}

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #f5f7fb;
}


    html {
    overflow-y: scroll;
}

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    
    /* Sidebar */
    .sidebar {
        width: 250px;
        min-height: 100vh;
        background: #2e3a59;
        color: #fff;
        padding: 20px;
        position: fixed;
        top: 0;
        left: 0;
        overflow-y: auto;
        border-right: 1px solid rgba(255,255,255,0.15);
    }

    .sidebar h2 {
        text-align: center;
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 1px solid rgba(255,255,255,0.15);
        font-weight: 500;
    }

    .sidebar a {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #ddd;
        text-decoration: none;
        padding: 12px 15px;
        border-radius: 5px;
        font-size: 16px;
        margin: 5px 0;
        transition: 0.3s;
        border-bottom: 1px solid rgba(255,255,255,0.12);  /* LINE ADDED */
    }

    .sidebar a:hover {
        background: #1cc88a;
        color: #fff;
    }

    /* ACTIVE MENU */
    .active {
        background: #1cc88a !important;
        color: #fff !important;
    }

    /* Main Content */
    
    .content-box {
        background: #ffffff;
        padding: 25px 30px;
        border-radius: 10px;
        box-shadow: none !important;     /* SHADOW REMOVED */
        border: 1px solid #e2e2e2;       /* CLEAN BORDER (optional) */
    }

    /* ===== TOP HEADER ===== */
/* ===== HEADER ===== */
.top-header {
    position: fixed;
    top: 0;
    left: 250px;
    right: 0;
    height: 60px;
    background: #2e3a59;   /* same as sidebar */
    display: flex;
    align-items: center;
    padding: 0 30px;
    z-index: 1000;
    border-bottom: 1px solid rgba(255,255,255,0.15);
}

/* pushes content to right */
.header-spacer {
    flex: 1;
}

.header-actions {
    display: flex;
    gap: 25px;
}

/* Header links */
.header-link {
    color: #ffffff;
    text-decoration: none;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
}

.header-link i {
    font-size: 16px;
}

.header-link:hover {
    color: #1cc88a;
}


/* ===== MAIN AREA ===== */
.main-area {
    margin-left: 250px;
    padding-top: 80px;
    min-height:100vh;
    background:#f5f6fa;
}


.content {
    padding: 30px;
}

.profile-link {
    color: #ffffff !important;
    text-decoration: none;
    cursor: pointer;
}

.profile-link:hover {
    color: #1cc88a;   /* same hover as sidebar */
}


</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2><i class="fas fa-hotel"></i> Hostel Admin</h2>

    <a href="/dashboard" class="{% if active_page=='dashboard' %}active{% endif %}">
        <i class="fas fa-home"></i> Dashboard
    </a>

    <a href="/students" class="{% if active_page=='students' %}active{% endif %}">
        <i class="fas fa-user-graduate"></i> Students
    </a>

    <a href="/rooms" class="{% if active_page=='rooms' %}active{% endif %}">
        <i class="fas fa-door-open"></i> Rooms
    </a>

    <a href="/beds" class="{% if active_page=='beds' %}active{% endif %}">
        <i class="fas fa-bed"></i> Beds
    </a>

    <a href="/fees" class="{% if active_page=='fees' %}active{% endif %}">
        <i class="fas fa-money-bill-wave"></i> Fees
    </a>


    <a href="/logs" class="{% if active_page=='logs' %}active{% endif %}">
        <i class="fas fa-history"></i> Log Report
    </a>

    <a href="/logout">
        <i class="fas fa-sign-out-alt"></i> Logout
    </a>
</div>

<!-- TOP HEADER -->
<div class="top-header">
    <div class="header-spacer"></div>

    <div class="header-actions">
        <a href="/dashboard" class="header-link">
            <i class="fas fa-house"></i> Home
        </a>

        <a href="{{ url_for('admin_profile') }}" class="nav-link profile-link">
            <i class="fas fa-user"></i> Profile
        </a>
    </div>
</div>

<!-- MAIN CONTENT -->
<div class="main-area">
    <div class="content">
        <div class="content-box">
            {% block content %}
            {% endblock %}
        </div>
    </div>
</div>

<!-- Toast Container -->
<!-- Toast Container -->
<div id="toast-container"
     style="position: fixed; bottom: 25px; right: 25px; z-index: 9999;">
</div>

<script>
function showToast(message, category) {
    let bg = "#28a745"; // success

    if (category === "error" || category === "danger") bg = "#dc3545";
    if (category === "warning") bg = "#ffc107";
    if (category === "info") bg = "#0dcaf0";

    let toast = document.createElement("div");
    toast.style.minWidth = "250px";
    toast.style.padding = "15px 20px";
    toast.style.marginTop = "10px";
    toast.style.borderRadius = "8px";
    toast.style.color = "white";
    toast.style.backgroundColor = bg;
    toast.style.fontSize = "15px";
    toast.style.boxShadow = "0 4px 12px rgba(0,0,0,0.15)";
    toast.style.opacity = "0";
    toast.style.transition = "opacity 0.5s ease";
    toast.innerText = message;

    document.getElementById("toast-container").appendChild(toast);

    setTimeout(() => toast.style.opacity = "1", 100);

    setTimeout(() => {
        toast.style.opacity = "0";
        setTimeout(() => toast.remove(), 500);
    }, 3000);
}
</script>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
<script>
document.addEventListener("DOMContentLoaded", function () {
    {% for category, message in messages %}
            showToast("{{ message }}", "{{ category }}");
    {% endfor %}
});
</script>
{% endif %}
{% endwith %}


</body>
</html>
