<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostel Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
</head>
<body>

<div class="login-container">
    <div class="login-box">
        <div class="login-icon"><i class="fas fa-hotel"></i></div>
        <h2>Hostel Management</h2>
        <p class="subtitle">Admin Login</p>

        <form method="POST" action="/" autocomplete="off" novalidate>
            <div class="input-group">
                <input
    type="email"
    name="email"
    id="email"
    required
    autocomplete="off"
    placeholder=" ">
<label>Email</label>
            </div>

            <div class="input-group">
                <input type="password" name="password" required autocomplete="new-password" placeholder=" " minlength="4">
                <label>Password</label>
            </div>

            <button type="submit" class="btn-login">Login</button>
        </form>
    </div>
</div>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
<div id="toast-container" style="position: fixed; bottom: 25px; right: 25px; z-index: 9999;"></div>
{% for category, message in messages %}
<div class="flask-toast" data-message="{{ message }}" data-category="{{ category }}" style="display:none;"></div>
{% endfor %}
<script>
function showToast(message, category) {
    let bg = "#1cc88a";
    if (category === "error" || category === "danger") bg = "#ef5a6f";
    if (category === "warning") bg = "#f6c23e";
    if (category === "info") bg = "#4e8cff";

    let toast = document.createElement("div");
    toast.style.minWidth = "250px";
    toast.style.padding = "14px 20px";
    toast.style.marginTop = "10px";
    toast.style.borderRadius = "10px";
    toast.style.color = "white";
    toast.style.background = bg;
    toast.style.fontSize = "14.5px";
    toast.style.fontWeight = "500";
    toast.style.boxShadow = "0 10px 25px rgba(0,0,0,0.35)";
    toast.style.opacity = "0";
    toast.style.transition = "opacity 0.4s ease";
    toast.innerText = message;

    document.getElementById("toast-container").appendChild(toast);
    requestAnimationFrame(() => toast.style.opacity = "1");
    setTimeout(() => {
        toast.style.opacity = "0";
        setTimeout(() => toast.remove(), 400);
    }, 3200);
}
document.addEventListener("DOMContentLoaded", function () {
    document.querySelectorAll(".flask-toast").forEach(function (el) {
        showToast(el.dataset.message, el.dataset.category);
    });
});
</script>
{% endif %}
{% endwith %}

<script src="{{ url_for('static', filename='js/validation.js') }}"></script>
</body>
</html>
