{% extends "base.html" %}
{% block content %}

<div class="container-box" style="max-width:880px; margin: auto;">
    <div class="page-title">Edit Student</div>

    <form method="POST" class="form-grid">
        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" value="{{ student.name }}" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" value="{{ student.email }}" required>
        </div>

        <div class="form-group">
            <label>Mobile</label>
            <input type="text"
                   name="mobile"
                   value="{{ student.mobile }}"
                   pattern="\d{10}"
                   maxlength="10"
                   title="Enter exactly 10 digits"
                   required>
        </div>

        <div class="form-group">
            <label>Emergency Contact</label>
            <input type="text"
                   name="emergency_contact"
                   value="{{ student.emergency_contact }}"
                   pattern="\d{10}"
                   maxlength="10"
                   title="Enter exactly 10 digits"
                   required>
        </div>

        <div class="form-group">
            <label>Join Date</label>
            <input type="date" name="join_date" value="{{ student.join_date }}" required>
        </div>

        <div class="form-group" style="grid-column: span 2; display:flex; justify-content:flex-end;">
            <button type="submit" class="btn-primary" style="width: 180px;">Save Changes</button>
        </div>
    </form>
</div>

{% endblock %}
