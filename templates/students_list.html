{% extends "base.html" %}
{% block content %}

<style>
    .container-box {
        background: rgba(15, 23, 42, 0.96);
        padding: 28px;
        border-radius: 24px;
        box-shadow: 0 24px 60px rgba(0,0,0,0.24);
        margin-top: 20px;
        border: 1px solid rgba(148, 163, 184, 0.16);
    }

    .breadcrumb {
        font-size: 15px;
        margin-bottom: 14px;
        color: #94a3b8;
    }

    .breadcrumb a {
        color: #38bdf8;
        text-decoration: none;
    }

    h3 {
        text-align: center;
        font-weight: 700;
        margin-bottom: 22px;
        color: #e2e8f0;
    }

    .top-actions {
        display: flex;
        justify-content: flex-start;
        align-items: center;
        margin-bottom: 16px;
    }

    .back-btn {
        padding: 10px 18px;
        background: rgba(56, 189, 248, 0.16);
        color: #e2e8f0;
        border-radius: 14px;
        text-decoration: none;
        font-size: 14px;
        border: 1px solid rgba(56, 189, 248, 0.22);
    }

    .back-btn:hover {
        background: rgba(56, 189, 248, 0.28);
    }

    table {
        width: 100%;
        max-width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
        text-align: center;
        border-radius: 18px;
        overflow: hidden;
    }

    th, td {
        padding: 14px 16px;
        border-bottom: 1px solid rgba(148, 163, 184, 0.16);
        font-size: 15px;
        color: #cbd5e1;
    }

    th {
        background: rgba(15, 23, 42, 0.98);
        font-weight: 700;
    }

    tbody tr:nth-child(even) {
        background: rgba(255,255,255,0.03);
    }

    tbody tr:hover {
        background: rgba(56, 189, 248, 0.08);
    }
</style>

<div class="card-body">

    <!-- Breadcrumb -->
    <p>
        <a href="{{ url_for('dashboard') }}">Dashboard</a> / Total Students
    </p>

    <!-- Page Title -->
    <h3>Total Students ({{ students|length }})</h3>

    <!-- Back Button Left Side -->
    <a href="{{ url_for('dashboard') }}" class="btn btn-primary" style="float: left; margin-bottom: 10px;">
        ⬅ Back
    </a>
    <div style="clear: both;"></div>

    <!-- Student Name Only Table -->
    <table class="table table-bordered table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
            </tr>
        </thead>

        <tbody>
            {% for student in students %}
            <tr>
                <td>{{ student.id }}</td>
                <td>{{ student.name }}</td>
                <td>₹{{ student.rent }}</td>

            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% endblock %}

</div>
