{% extends "base.html" %}
{% block content %}

<style>
    .container-box {
        background: var(--bg-card-alt, #1f2a42);
        padding: 25px;
        border-radius: 15px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        box-shadow: 0 8px 20px rgba(0,0,0,0.28);
        margin-top: 20px;
        animation: fadeInUp 0.4s ease both;
    }

    .breadcrumb {
        font-size: 15px;
        margin-bottom: 10px;
        color: var(--text-secondary, #a6b0c3);
    }

    .breadcrumb a {
        color: #6fa8ff;
        text-decoration: none;
    }

    h3 {
        text-align: center;
        font-weight: 600;
        margin-bottom: 20px;
        color: var(--text-primary, #e9edf7);
    }

    table th, table td {
        text-align: center;
        vertical-align: middle;
    }

    .top-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .back-btn {
        padding: 8px 16px;
        background: linear-gradient(135deg, #2a9df4, #1c7ed6);
        color: white;
        border-radius: 6px;
        text-decoration: none;
        font-size: 14px;
        transition: transform 0.2s ease;
    }

    .back-btn:hover {
        transform: translateY(-2px);
    }

    table {
        width: 50%;
        border-collapse: collapse;
        margin-top: 15px;
        text-align: center;
    }

    th, td {
        padding: 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        font-size: 15px;
        color: var(--text-primary, #e9edf7);
    }

    th {
        background: #202a42;
        color: #f1f4ff;
        font-weight: 600;
    }

</style>

<div class="card-body">

    <!-- Breadcrumb -->
    <p>
        <a href="{{ url_for('dashboard') }}">Dashboard</a> / Total Students
    </p>

    <!-- Page Title -->
    <h3>Total Students ({{ students|length }})</h3>

    <!-- Back Button Left Side -->
    <a href="{{ url_for('dashboard') }}" class="btn btn-primary" style="float: left; margin-bottom: 10px;">
        ⬅ Back
    </a>
    <div style="clear: both;"></div>

    <!-- Student Name Only Table -->
    <table class="table table-bordered table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
            </tr>
        </thead>

        <tbody>
            {% for student in students %}
            <tr>
                <td>{{ student.id }}</td>
                <td>{{ student.name }}</td>
                <td>₹{{ student.rent }}</td>

            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% endblock %}

</div>
