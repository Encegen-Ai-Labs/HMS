{% extends "base.html" %}
{% block content %}

<style>
    .page-container {
        max-width: 700px;
        margin: 10px auto 30px;
        padding: 30px;
        background: var(--bg-card-alt, #1f2a42);
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        font-family: "Inter", sans-serif;
        animation: fadeInUp 0.4s ease both;
    }

    .breadcrumb {
        color: var(--text-secondary, #a6b0c3);
        font-size: 15px;
        margin-bottom: 10px;
    }

    .breadcrumb a {
        color: #6fa8ff;
        text-decoration: none;
    }

    .breadcrumb a:hover {
        text-decoration: underline;
    }

    .back-btn {
        background: linear-gradient(135deg, #2a9df4, #1c7ed6);
        color: white;
        padding: 8px 18px;
        border-radius: 6px;
        text-decoration: none;
        font-size: 14px;
        transition: transform 0.2s ease;
    }

    .back-btn:hover {
        transform: translateY(-2px);
    }

    h2 {
        font-weight: 600;
        margin: 15px 0;
        text-align: center;
        color: var(--text-primary, #e9edf7);
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
    }

    th, td {
        padding: 12px 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        font-size: 15px;
        color: var(--text-primary, #e9edf7);
    }

    th {
        background: #202a42;
        color: #f1f4ff;
        text-align: left;
        font-weight: 600;
    }
</style>

<div class="page-container">

    <!-- Breadcrumb -->
    <p class="breadcrumb">
        <a href="{{ url_for('dashboard') }}">Dashboard</a> / Total Rooms
    </p>

    <!-- Back Button -->
    <a href="{{ url_for('dashboard') }}" class="back-btn">⬅ Back</a>

    <!-- Title -->
    <h2>Total Rooms</h2>

    <!-- Table with only Room Numbers -->
    <table>
        <thead>
            <tr>
                <th>Room Number</th>
            </tr>
        </thead>

        <tbody>
            {% for r in rooms %}
            <tr>
                <td>{{ r.room_number }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

{% endblock %}
