{% extends "base.html" %}
{% block content %}

<style>
    .page-container {
        max-width: 760px;
        margin: 30px auto;
        padding: 32px;
        background: rgba(15, 23, 42, 0.96);
        border-radius: 24px;
        box-shadow: 0 24px 60px rgba(0,0,0,0.24);
        border: 1px solid rgba(148, 163, 184, 0.16);
    }

    .breadcrumb {
        color: #94a3b8;
        font-size: 15px;
        margin-bottom: 14px;
    }

    .breadcrumb a {
        color: #38bdf8;
        text-decoration: none;
    }

    .breadcrumb a:hover {
        text-decoration: underline;
    }

    .back-btn {
        background: rgba(56, 189, 248, 0.16);
        color: #e2e8f0;
        padding: 10px 18px;
        border-radius: 14px;
        text-decoration: none;
        font-size: 14px;
        transition: background 0.2s ease;
        border: 1px solid rgba(56, 189, 248, 0.22);
    }

    .back-btn:hover {
        background: rgba(56, 189, 248, 0.28);
    }

    h2 {
        font-weight: 700;
        margin: 18px 0 14px;
        text-align: center;
        color: #e2e8f0;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 18px;
    }

    th, td {
        padding: 14px 12px;
        border-bottom: 1px solid rgba(148, 163, 184, 0.16);
        font-size: 15px;
        color: #cbd5e1;
    }

    th {
        background: rgba(15, 23, 42, 0.98);
        text-align: left;
        font-weight: 700;
    }

    tbody tr:nth-child(even) {
        background: rgba(255,255,255,0.03);
    }

    tbody tr:hover {
        background: rgba(56, 189, 248, 0.08);
    }
</style>

<div class="page-container">

    <!-- Breadcrumb -->
    <p class="breadcrumb">
        <a href="{{ url_for('dashboard') }}">Dashboard</a> / Total Rooms
    </p>

    <!-- Back Button -->
    <a href="{{ url_for('dashboard') }}" class="back-btn">⬅ Back</a>

    <!-- Title -->
    <h2>Total Rooms</h2>

    <!-- Table with only Room Numbers -->
    <table>
        <thead>
            <tr>
                <th>Room Number</th>
            </tr>
        </thead>

        <tbody>
            {% for r in rooms %}
            <tr>
                <td>{{ r.room_number }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

{% endblock %}
