{% extends "base.html" %}
{% block content %}

<style>
.total-fees-container {
    background: var(--bg-card-alt, #1f2a42);
    padding: 30px;
    border-radius: 15px;
    border: 1px solid rgba(255, 255, 255, 0.06);
    box-shadow: 0 8px 20px rgba(0,0,0,0.28);
    width: 90%;
    margin: 10px auto 30px;
    animation: fadeInUp 0.4s ease both;
}

.total-fees-title {
    font-size: 26px;
    font-weight: bold;
    margin-bottom: 20px;
    color: var(--text-primary, #e9edf7);
}

.fees-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

.fees-table th {
    background: #202a42;
    color: #f1f4ff;
    padding: 12px;
    text-align: left;
    font-size: 16px;
}

.fees-table td {
    padding: 12px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    font-size: 15px;
    color: var(--text-primary, #e9edf7);
}

.fees-table tr:hover {
    background: rgba(28, 200, 138, 0.08);
}

.amount {
    font-weight: bold;
    color: #46e0a8;
}
</style>

<div class="total-fees-container">

    <div class="total-fees-title">💰 Total Fees Per Student</div>

    <table class="fees-table">
        <tr>
            <th>Name</th>
            <th>Total Fee</th>
        </tr>

        {% for s in data %}
        <tr>
            <td>{{ s.name }}</td>
            <td class="amount">₹{{ s.total_fees }}</td>
        </tr>
        {% endfor %}
    </table>

</div>

{% endblock %}
