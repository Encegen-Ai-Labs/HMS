{% extends "base.html" %}
{% block content %}

<style>
.total-fees-container {
    background: rgba(15, 23, 42, 0.96);
    padding: 32px;
    border-radius: 24px;
    box-shadow: 0 28px 70px rgba(0, 0, 0, 0.24);
    width: min(100%, 980px);
    margin: 32px auto;
    border: 1px solid rgba(148, 163, 184, 0.16);
}

.total-fees-title {
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 24px;
    color: #f8fafc;
}

.fees-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 18px;
}

.fees-table th {
    background: rgba(15, 23, 42, 0.98);
    color: #e2e8f0;
    padding: 16px;
    text-align: left;
    font-size: 15px;
}

.fees-table td {
    padding: 16px;
    border-bottom: 1px solid rgba(148, 163, 184, 0.16);
    font-size: 15px;
    color: #cbd5e1;
}

.fees-table tr:nth-child(even) {
    background: rgba(255, 255, 255, 0.03);
}

.fees-table tr:hover {
    background: rgba(56, 189, 248, 0.08);
}

.amount {
    font-weight: bold;
    color: #a7f3d0;
}
</style>

<div class="total-fees-container">

    <div class="total-fees-title">💰 Total Fees Per Student</div>

    <table class="fees-table">
        <tr>
            <th>Name</th>
            <th>Total Fee</th>
        </tr>

        {% for s in data %}
        <tr>
            <td>{{ s.name }}</td>
            <td class="amount">₹{{ s.total_fees }}</td>
        </tr>
        {% endfor %}
    </table>

</div>

{% endblock %}
