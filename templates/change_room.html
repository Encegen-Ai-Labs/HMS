{% extends "base.html" %}
{% block content %}

<style>
    .change-room-container {
        max-width: 900px;
        margin: 10px auto 30px;
        background: var(--bg-card-alt, #1f2a42);
        padding: 40px;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        text-align: center;
        animation: fadeInUp 0.4s ease both;
        position: relative;
    }

    .breadcrumb-left {
        text-align: left !important;
        margin-left: 0;
        margin-bottom: 20px;
        font-weight: 500;
        color: var(--text-secondary, #a6b0c3);
    }

    .main-title {
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 5px;
        color: var(--text-primary, #e9edf7);
    }

    .student-title {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 25px;
        color: var(--accent, #1cc88a);
    }

    .form-row {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        gap: 15px;
        margin-top: 10px;
    }

    .form-row label {
        color: var(--text-secondary, #a6b0c3);
    }

    select {
        padding: 10px 15px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: var(--bg-input, #1c2438);
        color: var(--text-primary, #e9edf7);
        min-width: 220px;
    }

    .update-btn {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        background: linear-gradient(135deg, var(--blue, #4e8cff), #2e59d9);
        color: #fff;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s ease;
    }

    .update-btn:hover {
        transform: translateY(-2px);
    }

    .change-room-container .back-btn {
        position: static;
        display: inline-block;
        margin-bottom: 20px;
        background: linear-gradient(135deg, var(--blue, #4e8cff), #2e59d9);
        color: white;
        padding: 8px 18px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
        float: left;
    }
    .change-room-container .back-btn:hover {
        transform: translateY(-2px);
    }

</style>

<div class="change-room-container">
    <a href="{{ url_for('students') }}" class="back-btn">← Back</a>
    <div style="clear: both;"></div>

    <p class="breadcrumb-left">Student / Change Room</p>

    <div class="main-title">Change Room & Bed</div>

    <div class="student-title">for {{ student.name }}</div>

    <form method="POST" action="{{ url_for('update_room', student_id=student.id) }}">

        <div class="form-row">
            <label><b>Select New Bed:</b></label>

            <select name="bed_id" required>
                {% for b in beds %}
                <option value="{{ b.id }}">
                    Room: {{ b.room_number }} — Bed: {{ b.bed_label }}
                </option>
                {% endfor %}
            </select>

            <button class="update-btn">Update</button>
        </div>
    </form>

</div>

{% endblock %}
