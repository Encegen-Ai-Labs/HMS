{% extends "base.html" %}
{% block content %}

<style>
    .change-room-container {
        max-width: 900px;
        margin: 120px auto 40px;
        background: rgba(15, 23, 42, 0.96);
        padding: 36px;
        border-radius: 26px;
        box-shadow: 0 28px 70px rgba(0, 0, 0, 0.24);
        text-align: left;
        border: 1px solid rgba(148, 163, 184, 0.16);
        position: relative;
    }

    .breadcrumb-left {
        text-align: left !important;
        margin-left: 10px;
        font-weight: 500;
        color: #94a3b8;
    }

    .main-title {
        font-size: 28px;
        font-weight: 800;
        margin-bottom: 6px;
        color: #f8fafc;
    }

    .student-title {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 28px;
        color: #cbd5e1;
    }

    .form-row {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 16px;
        margin-top: 16px;
    }

    .form-row label {
        width: 100%;
        color: #cbd5e1;
        font-weight: 600;
    }

    select {
        width: 100%;
        max-width: 360px;
        padding: 14px 16px;
        border-radius: 16px;
        border: 1px solid rgba(148, 163, 184, 0.16);
        background: #0f172a;
        color: #e2e8f0;
    }

    .update-btn {
        padding: 14px 22px;
        min-width: 160px;
        border: none;
        border-radius: 16px;
        background: linear-gradient(135deg, #22c55e, #38bdf8);
        color: #0f172a;
        font-weight: 700;
        cursor: pointer;
    }

    .update-btn:hover {
        opacity: 0.96;
    }

    .back-btn {
        position: absolute;
        top: -18px;
        right: 24px;
        background: rgba(255, 255, 255, 0.06);
        color: #e2e8f0;
        padding: 10px 18px;
        border-radius: 16px;
        text-decoration: none;
        font-weight: 600;
        border: 1px solid rgba(148, 163, 184, 0.16);
        transition: background 0.2s ease;
    }

    .back-btn:hover {
        background: rgba(56, 189, 248, 0.14);
    }
</style>

<div class="change-room-container">
    <a href="{{ url_for('students') }}" class="back-btn">← Back</a>

    <p class="breadcrumb-left">Student / Change Room</p>

    <div class="main-title">Change Room & Bed</div>

    <div class="student-title">for {{ student.name }}</div>

    <form method="POST" action="{{ url_for('update_room', student_id=student.id) }}">

        <div class="form-row">
            <label><b>Select New Bed:</b></label>

            <select name="bed_id" required>
                {% for b in beds %}
                <option value="{{ b.id }}">
                    Room: {{ b.room_number }} — Bed: {{ b.bed_label }}
                </option>
                {% endfor %}
            </select>

            <button class="update-btn">Update</button>
        </div>
    </form>

</div>

{% endblock %}
